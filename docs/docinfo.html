<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<!-- GitHub 风格样式 -->
<style>
/* 全局重置 */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* 基础样式 */
:root {
    --color-fg-default: #1f2328;
    --color-fg-muted: #656d76;
    --color-fg-subtle: #6e7781;
    --color-canvas-default: #ffffff;
    --color-canvas-subtle: #f6f8fa;
    --color-canvas-inset: #0d1117;
    --color-border-default: #d1d9e0;
    --color-border-muted: #d8dee4;
    --color-accent-fg: #0969da;
    --color-accent-emphasis: #0969da;
    --color-accent-subtle: #ddf4ff;
    --color-success-fg: #1a7f37;
    --color-danger-fg: #cf222e;
    --color-attention-fg: #9a6700;
    --color-primer-shadow-inset: inset 0 1px 0 rgba(175, 184, 193, 0.2);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
    font-size: 16px;
    line-height: 1.5;
    color: var(--color-fg-default);
    background-color: var(--color-canvas-default);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* 顶部导航栏 */
#github-header {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    background-color: var(--color-canvas-subtle);
    border-bottom: 1px solid var(--color-border-default);
    position: sticky;
    top: 0;
    z-index: 100;
}

#github-header .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-right: auto;
    text-decoration: none;
    color: var(--color-fg-default);
}

#github-header .logo-icon {
    font-size: 32px;
}

#github-header .logo-text {
    font-weight: 600;
    font-size: 18px;
}

#github-header .search-container {
    flex: 1;
    max-width: 500px;
    margin: 0 auto;
}

#github-header .search-box {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--color-border-default);
    border-radius: 6px;
    background-color: var(--color-canvas-default);
    color: var(--color-fg-default);
    font-size: 14px;
}

#github-header .nav-links {
    display: flex;
    gap: 20px;
    margin-left: auto;
}

#github-header .nav-link {
    color: var(--color-fg-default);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
}

#github-header .nav-link:hover {
    color: var(--color-accent-fg);
}

/* 移动端菜单按钮 */
#mobile-menu-button {
    display: none;
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--color-fg-default);
    padding: 4px 8px;
}

/* 主要内容容器 */
#github-main-container {
    display: flex;
    flex: 1;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
    padding: 0;
}

/* 左侧侧边栏 */
#github-sidebar {
    width: 260px;
    padding: 24px 0 24px 24px;
    border-right: 1px solid var(--color-border-default);
    position: sticky;
    top: 66px;
    height: calc(100vh - 66px);
    overflow-y: auto;
    flex-shrink: 0;
}

#github-sidebar h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--color-border-default);
}

#github-sidebar ul {
    list-style: none;
}

#github-sidebar li {
    margin-bottom: 4px;
}

#github-sidebar a {
    display: block;
    padding: 6px 8px;
    color: var(--color-fg-default);
    text-decoration: none;
    font-size: 14px;
    border-radius: 6px;
    transition: background-color 0.2s;
}

#github-sidebar a:hover {
    background-color: var(--color-canvas-subtle);
}

#github-sidebar a.sidebar-h2 {
    font-weight: 600;
    margin-top: 8px;
}

#github-sidebar a.sidebar-h3 {
    padding-left: 20px;
    font-size: 13px;
    color: var(--color-fg-muted);
}

#github-sidebar a.sidebar-h4 {
    padding-left: 32px;
    font-size: 12px;
    color: var(--color-fg-subtle);
}

/* 中间内容区域 */
#github-content {
    flex: 1;
    padding: 32px 48px;
    max-width: 100%;
}

/* 重新样式化原文档元素 */
#header, #footer {
    display: none;
}

#content {
    width: 100% !important;
    float: none !important;
    padding: 0 !important;
    max-width: 100% !important;
}

#toc {
    display: none !important;
}

/* 内容区域样式 */
h1 {
    font-size: 32px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--color-border-muted);
}

h2 {
    font-size: 24px;
    font-weight: 600;
    margin-top: 32px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--color-border-muted);
}

h3 {
    font-size: 20px;
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 12px;
}

h4 {
    font-size: 16px;
    font-weight: 600;
    margin-top: 20px;
    margin-bottom: 8px;
}

p {
    margin-bottom: 16px;
}

/* 代码样式 */
pre {
    background-color: var(--color-canvas-subtle);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
    margin-bottom: 16px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 13px;
}

code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 13px;
    background-color: var(--color-canvas-subtle);
    padding: 2px 6px;
    border-radius: 4px;
}

/* 表格样式 */
table {
    width: 100%;
    border-spacing: 0;
    border-collapse: collapse;
    margin-bottom: 16px;
    font-size: 14px;
}

table th, table td {
    padding: 8px 12px;
    border: 1px solid var(--color-border-default);
}

table th {
    background-color: var(--color-canvas-subtle);
    font-weight: 600;
}

/* 链接样式 */
a {
    color: var(--color-accent-fg);
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* 列表样式 */
ul, ol {
    margin-bottom: 16px;
    padding-left: 24px;
}

li {
    margin-bottom: 4px;
}

/* 图片样式 */
img {
    max-width: 100%;
    height: auto;
    border-radius: 6px;
}

/* 视频样式 */
video {
    max-width: 100%;
    border-radius: 6px;
}

/* 移动端响应式 */
@media screen and (max-width: 1012px) {
    #github-sidebar {
        position: fixed;
        left: -280px;
        top: 66px;
        bottom: 0;
        background-color: var(--color-canvas-default);
        z-index: 99;
        transition: left 0.3s ease;
        box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }
    
    #github-sidebar.open {
        left: 0;
    }
    
    #mobile-menu-button {
        display: block;
        margin-right: 12px;
    }
    
    #github-content {
        padding: 24px 16px;
    }
}

@media screen and (max-width: 768px) {
    #github-header {
        padding: 12px 16px;
    }
    
    #github-header .search-container {
        display: none;
    }
    
    h1 {
        font-size: 24px;
    }
    
    h2 {
        font-size: 20px;
    }
    
    h3 {
        font-size: 18px;
    }
}

/* 遮罩层 */
#sidebar-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(0,0,0,0.5);
    z-index: 98;
    display: none;
}

#sidebar-overlay.show {
    display: block;
}
</style>

<!-- 顶部导航栏 -->
<div id="github-header">
    <button id="mobile-menu-button" aria-label="打开菜单">☰</button>
    <a href="https://github.com/YunJavaPro/kotlite-zh" class="logo">
        <span class="logo-icon">📚</span>
        <span class="logo-text">Kotlite 文档</span>
    </a>
    <div class="search-container">
        <input type="text" class="search-box" placeholder="搜索文档...">
    </div>
    <div class="nav-links">
        <a href="https://github.com/sunny-chung/kotlite" class="nav-link" target="_blank">原项目</a>
        <a href="https://github.com/YunJavaPro/kotlite-zh" class="nav-link">GitHub</a>
    </div>
</div>

<!-- 遮罩层 - 仅移动端 -->
<div id="sidebar-overlay"></div>

<!-- 主要内容容器 -->
<div id="github-main-container">
    <!-- 左侧侧边栏 -->
    <nav id="github-sidebar">
        <h2>📋 文档导航</h2>
        <ul id="sidebar-nav-list">
            <!-- 由 JavaScript 填充 -->
        </ul>
    </nav>
    
    <!-- 内容区域 - 由原内容填充 -->
    <div id="github-content">
        <!-- 原文档内容在这里 -->
    </div>
</div>

<!-- JavaScript 实现 -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const mobileMenuButton = document.getElementById('mobile-menu-button');
    const githubSidebar = document.getElementById('github-sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    const sidebarNavList = document.getElementById('sidebar-nav-list');
    const githubContent = document.getElementById('github-content');
    
    // 把原内容移到我们的容器中
    const originalContent = document.getElementById('content');
    if (originalContent && originalContent.parentNode) {
        // 移除一些不需要的元素
        const unwantedSelectors = ['#header', '#footer', '#toc'];
        unwantedSelectors.forEach(selector => {
            const el = document.querySelector(selector);
            if (el) el.remove();
        });
        
        // 移动内容
        while (originalContent.firstChild) {
            githubContent.appendChild(originalContent.firstChild);
        }
        originalContent.remove();
    }
    
    // 从页面中提取标题生成导航
    function generateNavigation() {
        const headers = githubContent.querySelectorAll('h1, h2, h3, h4');
        
        headers.forEach((header, index) => {
            // 为每个标题添加 ID，以便可以跳转
            if (!header.id) {
                header.id = 'heading-' + index;
            }
            
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#' + header.id;
            a.textContent = header.textContent;
            
            // 根据标题级别添加不同的样式类
            a.classList.add('sidebar-' + header.tagName.toLowerCase());
            
            a.addEventListener('click', function(e) {
                e.preventDefault();
                header.scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
                closeSidebar();
            });
            
            li.appendChild(a);
            sidebarNavList.appendChild(li);
        });
    }
    
    // 打开侧边栏 - 仅移动端
    function openSidebar() {
        githubSidebar.classList.add('open');
        sidebarOverlay.classList.add('show');
    }
    
    // 关闭侧边栏
    function closeSidebar() {
        githubSidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
    }
    
    // 切换侧边栏状态
    function toggleSidebar() {
        if (githubSidebar.classList.contains('open')) {
            closeSidebar();
        } else {
            openSidebar();
        }
    }
    
    // 事件监听
    if (mobileMenuButton) {
        mobileMenuButton.addEventListener('click', toggleSidebar);
    }
    if (sidebarOverlay) {
        sidebarOverlay.addEventListener('click', closeSidebar);
    }
    
    // ESC 键关闭侧边栏
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && githubSidebar.classList.contains('open')) {
            closeSidebar();
        }
    });
    
    // 生成导航
    generateNavigation();
});
</script>
