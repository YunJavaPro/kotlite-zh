<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<!-- 现代风格样式 -->
<style>
/* 全局重置 */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* 滚动平滑和锚点偏移修复 */
html {
    scroll-behavior: smooth;
}

/* 为所有标题添加上边距，防止被顶部导航栏遮挡 */
h1, h2, h3, h4, h5, h6 {
    scroll-margin-top: 80px;
}

/* 主题变量 */
:root {
    /* 深色主题（默认） */
    --primary-color: #6366f1;
    --primary-light: #818cf8;
    --primary-dark: #4f46e5;
    --secondary-color: #8b5cf6;
    --accent-color: #ec4899;
    --bg-dark: #0f172a;
    --bg-light: #1e293b;
    --bg-card: #334155;
    --text-primary: #f8fafc;
    --text-secondary: #cbd5e1;
    --text-muted: #94a3b8;
    --border-color: #475569;
    --success-color: #10b981;
    --warning-color: #f59e0b;
    --error-color: #ef4444;
    --code-bg: #1e1e2e;
    --header-bg: rgba(15, 23, 42, 0.95);
    --header-height: 64px;
}

/* 浅色主题 */
.light-mode {
    --primary-color: #4f46e5;
    --primary-light: #6366f1;
    --primary-dark: #4338ca;
    --secondary-color: #7c3aed;
    --accent-color: #db2777;
    --bg-dark: #f8fafc;
    --bg-light: #e2e8f0;
    --bg-card: #ffffff;
    --text-primary: #1e293b;
    --text-secondary: #475569;
    --text-muted: #64748b;
    --border-color: #cbd5e1;
    --code-bg: #1e1e2e;
    --header-bg: rgba(248, 250, 252, 0.95);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: var(--text-primary);
    background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
    min-height: 100vh;
    padding-top: var(--header-height);
    transition: all 0.3s ease;
}

.light-mode body, body.light-mode {
    background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
}

/* 顶部导航栏 */
#github-header {
    display: flex;
    align-items: center;
    padding: 0 24px;
    background: var(--header-bg);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    height: var(--header-height);
    transition: all 0.3s ease;
}

#github-header .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-right: auto;
    text-decoration: none;
    color: var(--text-primary);
}

#github-header .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#github-header .logo-icon svg {
    width: 18px;
    height: 18px;
    fill: white;
}

#github-header .logo-text {
    font-weight: 700;
    font-size: 18px;
    background: linear-gradient(90deg, var(--primary-light), var(--accent-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

#github-header .search-container {
    flex: 1;
    max-width: 400px;
    margin: 0 24px;
}

#github-header .search-box {
    width: 100%;
    padding: 8px 16px;
    border: 1px solid var(--border-color);
    border-radius: 24px;
    background-color: var(--bg-card);
    color: var(--text-primary);
    font-size: 14px;
    transition: all 0.3s ease;
}

#github-header .search-box:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
}

#github-header .nav-links {
    display: flex;
    gap: 16px;
    align-items: center;
}

#github-header .nav-link {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
}

#github-header .nav-link:hover {
    color: var(--text-primary);
    background-color: var(--bg-card);
}

#github-header .nav-link .icon {
    width: 16px;
    height: 16px;
}

/* 主题切换按钮 */
#theme-toggle {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    cursor: pointer;
    padding: 8px;
    transition: all 0.3s ease;
    color: var(--text-primary);
    display: flex;
    align-items: center;
}

#theme-toggle:hover {
    background: var(--primary-color);
    border-color: var(--primary-color);
}

/* 移动端菜单按钮 */
#mobile-menu-button {
    display: none;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 20px;
    cursor: pointer;
    color: var(--text-primary);
    padding: 10px 14px;
    margin-right: 12px;
    transition: all 0.3s ease;
}

#mobile-menu-button:hover {
    background: var(--primary-color);
    border-color: var(--primary-color);
}

/* 主要内容容器 */
#github-main-container {
    display: flex;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
    min-height: calc(100vh - var(--header-height));
}

/* 左侧侧边栏 */
#github-sidebar {
    width: 280px;
    padding: 24px 0;
    border-right: 1px solid var(--border-color);
    position: sticky;
    top: var(--header-height);
    height: calc(100vh - var(--header-height));
    overflow-y: auto;
    overflow-x: hidden;
    flex-shrink: 0;
}

#github-sidebar h2 {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin: 0 24px 16px 24px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 8px;
}

#github-sidebar ul {
    list-style: none;
}

#github-sidebar li {
    margin-bottom: 2px;
}

#github-sidebar a {
    display: block;
    padding: 8px 24px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
}

#github-sidebar a:hover {
    color: var(--text-primary);
    background: var(--bg-card);
}

#github-sidebar a.active {
    color: var(--primary-light);
    background: rgba(99, 102, 241, 0.1);
    border-left-color: var(--primary-color);
}

#github-sidebar a.sidebar-h2 {
    font-weight: 600;
    margin-top: 4px;
    color: var(--text-primary);
}

#github-sidebar a.sidebar-h3 {
    padding-left: 40px;
    font-size: 13px;
}

#github-sidebar a.sidebar-h4 {
    padding-left: 56px;
    font-size: 12px;
}

/* 自定义滚动条 */
#github-sidebar::-webkit-scrollbar {
    width: 6px;
}

#github-sidebar::-webkit-scrollbar-track {
    background: transparent;
}

#github-sidebar::-webkit-scrollbar-thumb {
    background: var(--border-color);
    border-radius: 3px;
}

#github-sidebar::-webkit-scrollbar-thumb:hover {
    background: var(--text-muted);
}

/* 中间内容区域 */
#github-content {
    flex: 1;
    padding: 40px 60px;
    max-width: 100%;
    overflow-x: hidden;
}

/* 重新样式化原文档元素 */
#header, #footer {
    display: none;
}

#content {
    width: 100% !important;
    float: none !important;
    padding: 0 !important;
    max-width: 100% !important;
}

#toc {
    display: none !important;
}

/* 内容区域样式 */
h1 {
    font-size: 36px;
    font-weight: 800;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--border-color);
    background: linear-gradient(90deg, var(--primary-light), var(--accent-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

h2 {
    font-size: 26px;
    font-weight: 700;
    margin-top: 40px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-primary);
}

h3 {
    font-size: 22px;
    font-weight: 600;
    margin-top: 32px;
    margin-bottom: 14px;
    color: var(--text-primary);
}

h4 {
    font-size: 18px;
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 10px;
    color: var(--text-secondary);
}

p {
    margin-bottom: 16px;
    color: var(--text-secondary);
}

/* 代码块容器 */
.code-block-wrapper {
    position: relative;
    margin-bottom: 20px;
}

/* 代码样式 - 现代主题 */
pre {
    background: linear-gradient(135deg, #1e1e2e 0%, #2d2d3f 100%);
    border-radius: 12px;
    padding: 20px;
    overflow-x: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 14px;
    line-height: 1.6;
    border: 1px solid var(--border-color);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
}

code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 14px;
    background: var(--bg-card);
    padding: 3px 8px;
    border-radius: 6px;
    color: var(--accent-color);
}

pre code {
    background: transparent;
    padding: 0;
    border-radius: 0;
    color: #f8fafc;
}

/* 复制按钮 - 右下角位置 */
.copy-button {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 10;
}

.copy-button:hover {
    background: var(--primary-color);
    border-color: var(--primary-color);
    color: white;
}

.copy-button.copied {
    background: var(--success-color);
    border-color: var(--success-color);
    color: white;
}

/* 表格样式 */
table {
    width: 100%;
    border-spacing: 0;
    border-collapse: collapse;
    margin-bottom: 20px;
    font-size: 14px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
}

table th, table td {
    padding: 14px 18px;
    border: 1px solid var(--border-color);
}

table th {
    background: linear-gradient(135deg, var(--bg-card), #2d3748);
    font-weight: 700;
    color: var(--text-primary);
    text-align: left;
}

.light-mode table th, table th {
    background: linear-gradient(135deg, var(--bg-card), #e2e8f0);
}

table td {
    background: var(--bg-light);
    color: var(--text-secondary);
}

table tr:hover td {
    background: var(--bg-card);
}

/* 链接样式 */
a {
    color: var(--primary-light);
    text-decoration: none;
    transition: all 0.2s ease;
}

a:hover {
    color: var(--accent-color);
    text-decoration: underline;
}

/* 列表样式 */
ul, ol {
    margin-bottom: 20px;
    padding-left: 28px;
}

li {
    margin-bottom: 6px;
    color: var(--text-secondary);
}

/* 图片样式 */
img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    margin: 20px 0;
}

/* 视频样式 */
video {
    max-width: 100%;
    border-radius: 12px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
}

/* Demo 突出卡片 */
.demo-highlight {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
    border: 2px solid var(--primary-color);
    border-radius: 16px;
    padding: 24px;
    margin: 24px 0;
    text-align: center;
    box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
}

.demo-highlight h2 {
    border: none;
    margin-top: 0;
    padding-bottom: 8px;
}

.demo-highlight a {
    display: inline-block;
    margin-top: 16px;
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
}

.demo-highlight a:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
}

/* 移动端响应式 */
@media screen and (max-width: 1024px) {
    #github-sidebar {
        position: fixed;
        left: -300px;
        top: var(--header-height);
        bottom: 0;
        background: var(--bg-dark);
        z-index: 999;
        transition: left 0.3s ease;
        box-shadow: 4px 0 20px rgba(0,0,0,0.4);
        border-right: 1px solid var(--border-color);
    }
    
    .light-mode #github-sidebar {
        background: var(--bg-dark);
    }
    
    #github-sidebar.open {
        left: 0;
    }
    
    #mobile-menu-button {
        display: block;
    }
    
    #github-content {
        padding: 24px 20px;
    }
}

@media screen and (max-width: 768px) {
    #github-header {
        padding: 0 16px;
    }
    
    #github-header .search-container {
        display: none;
    }
    
    #github-header .nav-links {
        display: none;
    }
    
    h1 {
        font-size: 28px;
    }
    
    h2 {
        font-size: 22px;
    }
    
    h3 {
        font-size: 18px;
    }
    
    #github-content {
        padding: 20px 16px;
    }
    
    pre {
        padding: 14px;
        font-size: 13px;
    }
    
    table th, table td {
        padding: 10px 12px;
    }
}

/* 遮罩层 */
#sidebar-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(0,0,0,0.6);
    z-index: 998;
    display: none;
    backdrop-filter: blur(4px);
}

#sidebar-overlay.show {
    display: block;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const mobileMenuButton = document.getElementById('mobile-menu-button');
    const githubSidebar = document.getElementById('github-sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    const sidebarNavList = document.getElementById('sidebar-nav-list');
    const githubContent = document.getElementById('github-content');
    const themeToggle = document.getElementById('theme-toggle');
    const moonIcon = document.getElementById('moon-icon');
    const sunIcon = document.getElementById('sun-icon');
    let allHeaders = [];
    
    // 主题系统 - 支持跟随系统和手动切换
    function initTheme() {
        const savedTheme = localStorage.getItem('kotlite-theme');
        
        // 如果没有保存的主题，使用系统主题
        if (!savedTheme) {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (!prefersDark) {
                document.body.classList.add('light-mode');
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            }
        } else if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            moonIcon.style.display = 'none';
            sunIcon.style.display = 'block';
        }
        
        // 监听系统主题变化
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            const savedTheme = localStorage.getItem('kotlite-theme');
            // 只有当没有手动设置主题时才跟随系统
            if (!savedTheme) {
                if (e.matches) {
                    document.body.classList.remove('light-mode');
                    moonIcon.style.display = 'block';
                    sunIcon.style.display = 'none';
                } else {
                    document.body.classList.add('light-mode');
                    moonIcon.style.display = 'none';
                    sunIcon.style.display = 'block';
                }
            }
        });
    }
    
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        localStorage.setItem('kotlite-theme', isLight ? 'light' : 'dark');
        
        if (isLight) {
            moonIcon.style.display = 'none';
            sunIcon.style.display = 'block';
        } else {
            moonIcon.style.display = 'block';
            sunIcon.style.display = 'none';
        }
    }
    
    initTheme();
    themeToggle.addEventListener('click', toggleTheme);
    
    // 把原内容移到我们的容器中
    const originalContent = document.getElementById('content');
    if (originalContent && originalContent.parentNode) {
        // 移除一些不需要的元素
        const unwantedSelectors = ['#header', '#footer', '#toc'];
        unwantedSelectors.forEach(selector => {
            const el = document.querySelector(selector);
            if (el) el.remove();
        });
        
        // 移动内容
        while (originalContent.firstChild) {
            githubContent.appendChild(originalContent.firstChild);
        }
        originalContent.remove();
    }
    
    // 查找第一个 Demo 部分并添加突出显示
    function highlightDemoSection() {
        const h2Elements = githubContent.querySelectorAll('h2');
        h2Elements.forEach(h2 => {
            if (h2.textContent.includes('Demo') || h2.textContent.includes('演示')) {
                const wrapper = document.createElement('div');
                wrapper.className = 'demo-highlight';
                const nextEl = h2.nextElementSibling;
                
                h2.parentNode.insertBefore(wrapper, h2);
                wrapper.appendChild(h2);
                
                if (nextEl) {
                    wrapper.appendChild(nextEl);
                }
                
                // 添加 Demo 链接
                const demoLink = document.createElement('a');
                demoLink.href = 'demo/index.html';
                demoLink.textContent = '立即体验';
                wrapper.appendChild(demoLink);
            }
        });
    }
    
    // 为代码块添加复制按钮
    function addCopyButtons() {
        const codeBlocks = githubContent.querySelectorAll('pre');
        codeBlocks.forEach(block => {
            const wrapper = document.createElement('div');
            wrapper.className = 'code-block-wrapper';
            
            block.parentNode.insertBefore(wrapper, block);
            wrapper.appendChild(block);
            
            const button = document.createElement('button');
            button.className = 'copy-button';
            button.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> 复制';
            
            button.addEventListener('click', function() {
                const code = block.textContent;
                navigator.clipboard.writeText(code).then(() => {
                    const originalHTML = button.innerHTML;
                    button.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> 已复制';
                    button.classList.add('copied');
                    
                    setTimeout(() => {
                        button.innerHTML = originalHTML;
                        button.classList.remove('copied');
                    }, 2000);
                });
            });
            
            wrapper.appendChild(button);
        });
    }
    
    // 从页面中提取标题生成导航
    function generateNavigation() {
        allHeaders = githubContent.querySelectorAll('h1, h2, h3, h4');
        
        allHeaders.forEach((header, index) => {
            // 为每个标题添加 ID，以便可以跳转
            if (!header.id) {
                header.id = 'heading-' + index;
            }
            
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#' + header.id;
            a.textContent = header.textContent;
            a.dataset.headerId = header.id;
            
            // 根据标题级别添加不同的样式类
            a.classList.add('sidebar-' + header.tagName.toLowerCase());
            
            a.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.getElementById(header.id);
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
                closeSidebar();
            });
            
            li.appendChild(a);
            sidebarNavList.appendChild(li);
        });
        
        // 初始化高亮
        updateActiveLink();
    }
    
    // 更新侧边栏当前激活的链接
    function updateActiveLink() {
        const scrollPosition = window.scrollY + 100;
        
        let currentActiveHeader = null;
        for (let i = allHeaders.length - 1; i >= 0; i--) {
            const header = allHeaders[i];
            if (header.offsetTop <= scrollPosition) {
                currentActiveHeader = header;
                break;
            }
        }
        
        // 清除所有激活状态
        const allLinks = sidebarNavList.querySelectorAll('a');
        allLinks.forEach(link => {
            link.classList.remove('active');
        });
        
        // 激活当前链接
        if (currentActiveHeader) {
            const activeLink = sidebarNavList.querySelector(`a[data-header-id="${currentActiveHeader.id}"]`);
            if (activeLink) {
                activeLink.classList.add('active');
                // 滚动侧边栏使激活项可见
                activeLink.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }
    }
    
    // 打开侧边栏 - 仅移动端
    function openSidebar() {
        githubSidebar.classList.add('open');
        sidebarOverlay.classList.add('show');
        document.body.style.overflow = 'hidden';
    }
    
    // 关闭侧边栏
    function closeSidebar() {
        githubSidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
        document.body.style.overflow = '';
    }
    
    // 切换侧边栏状态
    function toggleSidebar() {
        if (githubSidebar.classList.contains('open')) {
            closeSidebar();
        } else {
            openSidebar();
        }
    }
    
    // 事件监听
    if (mobileMenuButton) {
        mobileMenuButton.addEventListener('click', toggleSidebar);
    }
    if (sidebarOverlay) {
        sidebarOverlay.addEventListener('click', closeSidebar);
    }
    
    // ESC 键关闭侧边栏
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && githubSidebar.classList.contains('open')) {
            closeSidebar();
        }
        // Ctrl+K 聚焦搜索框
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            const searchBox = document.querySelector('.search-box');
            if (searchBox) searchBox.focus();
        }
    });
    
    // 滚动监听更新侧边栏高亮
    let ticking = false;
    window.addEventListener('scroll', function() {
        if (!ticking) {
            window.requestAnimationFrame(function() {
                updateActiveLink();
                ticking = false;
            });
            ticking = true;
        }
    });
    
    // 生成导航
    generateNavigation();
    
    // 添加复制按钮
    addCopyButtons();
    
    // 突出显示 Demo 部分
    highlightDemoSection();
});
</script>
