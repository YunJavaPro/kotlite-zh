<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotlite 测试页面</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent-color: #ec4899;
            --bg-dark: #0f172a;
            --bg-light: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        .light-mode {
            --primary-color: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #4338ca;
            --accent-color: #db2777;
            --bg-dark: #f8fafc;
            --bg-light: #e2e8f0;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .header-left h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-light), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header-left p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-right a {
            color: var(--text-secondary);
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .header-right a:hover {
            color: var(--text-primary);
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        #theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            padding: 10px;
            transition: all 0.3s ease;
            color: var(--text-primary);
            display: flex;
            align-items: center;
        }

        #theme-toggle:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .header-right {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        .sidebar {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 20px;
            backdrop-filter: blur(10px);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .example-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .example-btn {
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .example-btn:hover {
            background: var(--bg-light);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .example-btn.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(236, 72, 153, 0.15));
            color: var(--primary-light);
            border-color: var(--primary-color);
        }

        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                overflow-y: auto;
                border-radius: 0;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-menu-btn {
                display: flex;
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 999;
            }

            .sidebar-overlay.show {
                display: block;
            }
        }

        .mobile-menu-btn {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 10px 16px;
            margin-right: 12px;
            transition: all 0.3s ease;
            align-items: center;
        }

        .mobile-menu-btn:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 14px;
            line-height: 1.7;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        #txtOutput {
            min-height: 250px;
        }

        .library-section {
            margin-top: 20px;
        }

        .library-section h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .library-section .note {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--primary-color);
        }

        .library-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .library-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 12px;
            background: var(--bg-light);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .library-item:hover {
            border-color: var(--primary-color);
        }

        .library-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .library-item label {
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .library-item input[type="checkbox"]:checked + label {
            color: var(--primary-light);
            font-weight: 500;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 16px;
            }

            .section-header {
                flex-direction: column;
                gap: 14px;
                align-items: stretch;
            }

            .button-group {
                justify-content: center;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }

            textarea {
                min-height: 250px;
            }

            .header-right {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                    </svg>
                </button>
                <div class="header-left">
                    <h1>Kotlite 测试页面</h1>
                    <p>一站式测试 Kotlite 所有功能！</p>
                </div>
            </div>
            <div class="header-right">
                <a href="index.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5V5H7c-1.1 0-1.99.9-1.99 2v4H3.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5H5v4c0 1.1.9 2 2 2h4v1.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h4c1.1 0 2-.9 2-2v-4h1.5c.83 0 1.5-.67 1.5-1.5s-.67-1.5-1.5-1.5z"/>
                    </svg>
                    演示
                </a>
                <a href="../index.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                    文档
                </a>
                <button id="theme-toggle" title="切换主题">
                    <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <svg id="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                        <path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0-5a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1zm0 18a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1zM5.172 6.172a1 1 0 0 1 1.414 0l.707.707a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 0 1 0-1.414zm11.314 11.314a1 1 0 0 1 1.414 0l.707.707a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 0 1 0-1.414zM3 13a1 1 0 1 0 0-2H2a1 1 0 0 0 0 2h1zm20-1a1 1 0 1 1-2 0h-1a1 1 0 1 1 2 0h1zM5.172 17.828a1 1 0 0 1 0-1.414l.707-.707a1 1 0 0 1 1.414 1.414l-.707.707a1 1 0 0 1-1.414 0zm11.314-11.314a1 1 0 0 1 0-1.414l.707-.707a1 1 0 0 1 1.414 1.414l-.707.707a1 1 0 0 1-1.414 0z"/>
                    </svg>
                </button>
            </div>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <div class="main-grid">
            <aside class="sidebar" id="sidebar">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                    </svg>
                    示例列表
                </h2>
                <ul class="example-list" id="exampleList">
                </ul>
            </aside>

            <main class="workspace">
                <div class="card">
                    <div class="section-header">
                        <h2>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/>
                            </svg>
                            代码编辑器
                        </h2>
                        <div class="button-group">
                            <button class="btn btn-secondary" id="clearBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                                </svg>
                                清空
                            </button>
                            <button class="btn btn-primary" id="runBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                                运行代码
                            </button>
                        </div>
                    </div>
                    <textarea id="txtCode" placeholder="在此输入 Kotlin 代码...">println("欢迎使用 Kotlite 测试页面！")
println("请从左侧选择一个示例，或直接在此输入代码进行测试。")</textarea>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="section-header">
                        <h2>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                            </svg>
                            输出结果
                        </h2>
                        <div class="button-group">
                            <button class="btn btn-secondary" id="clearOutputBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                                </svg>
                                清空输出
                            </button>
                            <button class="btn btn-secondary" id="copyOutputBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M16 1H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V3h12v10z"/>
                                    <path d="M20 7h-4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V11c0-1.1-.9-2-2-2z"/>
                                </svg>
                                复制输出
                            </button>
                        </div>
                    </div>
                    <textarea id="txtOutput" readonly placeholder="运行结果将显示在这里..."></textarea>

                    <div class="library-section">
                        <h3>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                            </svg>
                            标准库
                        </h3>
                        <p class="note">注意：某些标准库依赖于其他标准库</p>
                        <div class="library-list" id="cotStdlibs">

                    </div>
                </div>
            </main>
        </div>

    <script>
        // 主题系统
        function initTheme() {
            const savedTheme = localStorage.getItem('kotlite-theme');
            
            if (!savedTheme) {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (!prefersDark) {
                    document.body.classList.add('light-mode');
                    document.getElementById('moon-icon').style.display = 'none';
                    document.getElementById('sun-icon').style.display = 'block';
                }
            } else if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('moon-icon').style.display = 'none';
                document.getElementById('sun-icon').style.display = 'block';
            }
            
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                const savedTheme = localStorage.getItem('kotlite-theme');
                if (!savedTheme) {
                    if (e.matches) {
                        document.body.classList.remove('light-mode');
                        document.getElementById('moon-icon').style.display = 'block';
                        document.getElementById('sun-icon').style.display = 'none';
                    } else {
                        document.body.classList.add('light-mode');
                        document.getElementById('moon-icon').style.display = 'none';
                        document.getElementById('sun-icon').style.display = 'block';
                    }
                }
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('kotlite-theme', isLight ? 'light' : 'dark');
            
            const moonIcon = document.getElementById('moon-icon');
            const sunIcon = document.getElementById('sun-icon');
            if (isLight) {
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            } else {
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            }
        }

        initTheme();
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

        // 移动端侧边栏
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        mobileMenuBtn.addEventListener('click', function() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        });

        sidebarOverlay.addEventListener('click', function() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });

        // 示例代码
        const examples = [
            { category: '基础测试', name: 'Hello World', id: 'hello', code: 'println("Hello, 世界！")\nprintln("欢迎使用 Kotlite！")' },
            { category: '基础测试', name: '变量和数据类型', id: 'variables', code: '// 变量声明\nval immutable = "我是不可变的"\nvar mutable = "我是可变的"\nmutable = "我改变了！"\n\n// 数据类型\nval intNum: Int = 42\nval longNum: Long = 10000000000L\nval doubleNum: Double = 3.14159\nval booleanVal: Boolean = true\nval charVal: Char = \'A\'\n\nprintln("整数: " + intNum)\nprintln("长整数: " + longNum)\nprintln("浮点数: " + doubleNum)\nprintln("布尔值: " + booleanVal)\nprintln("字符: " + charVal)\nprintln("不可变变量: " + immutable)\nprintln("可变变量: " + mutable)' },
            { category: '基础测试', name: '字符串操作', id: 'strings', code: 'val str = "Hello, Kotlin!"\n\n// 基本操作\nprintln("字符串: " + str)\nprintln("长度: " + str.length)\n\n// 检查包含\nprintln("包含 \\"Kotlin\\": " + str.contains("Kotlin"))\n\n// 分割\nval parts = str.split(",")\nprintln("分割后: " + parts)' },
            { category: '列表集合', name: 'List 操作', id: 'list', code: '// 创建列表\nval list = listOf("苹果", "香蕉", "橙子")\nprintln("原列表: " + list)\n\n// 访问元素\nprintln("第一个元素: " + list[0])\n\n// 遍历\nprintln("\\n遍历列表:")\nfor (item in list) {\n    println("- " + item)\n}\n\n// 可变列表\nval mutableList = mutableListOf(1, 2, 3)\nprintln("\\n可变列表初始: " + mutableList)\nmutableList.add(4)\nmutableList.add(0, 0)\nprintln("添加后: " + mutableList)' },
            { category: '控制流程', name: '条件语句', id: 'condition', code: 'val score = 85\n\n// if 表达式\nval result = if (score >= 90) {\n    "优秀"\n} else if (score >= 80) {\n    "良好"\n} else if (score >= 60) {\n    "及格"\n} else {\n    "不及格"\n}\nprintln("成绩 " + score + ": " + result)' },
            { category: '控制流程', name: '循环控制', id: 'loop', code: '// for 循环范围\nprintln("1到5:")\nfor (i in 1..5) {\n    println(i)\n}\n\nprintln("\\n直到10:")\nfor (i in 1 until 10) {\n    println(i)\n}' },
            { category: '函数', name: '函数定义', id: 'functions', code: '// 简单函数\nfun greet(name: String): String {\n    return "你好, " + name + "！"\n}\nprintln(greet("张三"))\n\n// 单表达式函数\nfun add(a: Int, b: Int): Int = a + b\nprintln("10 + 20 = " + add(10, 20))' },
            { category: '实战示例', name: '斐波那契数列', id: 'fibonacci', code: 'fun fibonacci(n: Int) {\n    var a = 0\n    var b = 1\n    \n    for (i in 1..n) {\n        println(a)\n        val next = a + b\n        a = b\n        b = next\n    }\n}\n\nprintln("斐波那契前10项:")\nfibonacci(10)' },
            { category: '实战示例', name: '素数检测', id: 'prime', code: 'fun isPrime(n: Int): Boolean {\n    if (n <= 1) return false\n    if (n <= 3) return true\n    if (n % 2 == 0 || n % 3 == 0) return false\n    \n    var i = 5\n    while (i * i <= n) {\n        if (n % i == 0 || n % (i + 2) == 0) return false\n        i += 6\n    }\n    return true\n}\n\n// 查找 1-50 之间的素数\nprintln("1-50之间的素数:")\nfor (i in 1..50) {\n    if (isPrime(i)) {\n        println(i)\n    }\n}' }
        ];

        // 填充示例列表
        const exampleList = document.getElementById('exampleList');
        let currentActiveExample = null;
        let currentCategory = '';
        
        examples.forEach(example => {
            if (example.category !== currentCategory) {
                const h3 = document.createElement('h3');
                h3.textContent = example.category;
                exampleList.appendChild(h3);
                currentCategory = example.category;
            }
            
            const li = document.createElement('li');
            const btn = document.createElement('button');
            btn.className = 'example-btn';
            btn.textContent = example.name;
            btn.dataset.exampleId = example.id;
            
            btn.addEventListener('click', function() {
                if (currentActiveExample) {
                    currentActiveExample.classList.remove('active');
                }
                btn.classList.add('active');
                currentActiveExample = btn;
                
                document.getElementById('txtCode').value = example.code;
                document.getElementById('txtOutput').value = '';
                
                // 移动端关闭侧边栏
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            });
            
            li.appendChild(btn);
            exampleList.appendChild(li);
        });

        // 按钮事件
        document.getElementById('clearBtn').addEventListener('click', function() {
            document.getElementById('txtCode').value = '';
        });

        document.getElementById('clearOutputBtn').addEventListener('click', function() {
            document.getElementById('txtOutput').value = '';
        });

        document.getElementById('copyOutputBtn').addEventListener('click', function() {
            const output = document.getElementById('txtOutput');
            output.select();
            document.execCommand('copy');
        });
    </script>
    <script src="kotlite-demo.js"></script>
</body>
