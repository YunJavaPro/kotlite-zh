<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotlite 测试页面</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent-color: #ec4899;
            --bg-dark: #0f172a;
            --bg-light: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        .light-mode {
            --primary-color: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #4338ca;
            --accent-color: #db2777;
            --bg-dark: #f8fafc;
            --bg-light: #e2e8f0;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .header-left h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-light), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header-left p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-right a {
            color: var(--text-secondary);
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .header-right a:hover {
            color: var(--text-primary);
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        #theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            padding: 10px;
            transition: all 0.3s ease;
            color: var(--text-primary);
            display: flex;
            align-items: center;
        }

        #theme-toggle:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .header-right {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        .sidebar {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 20px;
            backdrop-filter: blur(10px);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .example-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .example-btn {
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .example-btn:hover {
            background: var(--bg-light);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .example-btn.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(236, 72, 153, 0.15));
            color: var(--primary-light);
            border-color: var(--primary-color);
        }

        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                overflow-y: auto;
                border-radius: 0;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-menu-btn {
                display: flex;
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 999;
            }

            .sidebar-overlay.show {
                display: block;
            }
        }

        .mobile-menu-btn {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 10px 16px;
            margin-right: 12px;
            transition: all 0.3s ease;
            align-items: center;
        }

        .mobile-menu-btn:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 14px;
            line-height: 1.7;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        #output, #txtOutput {
            min-height: 250px;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
            border: 1px solid transparent;
        }

        .status-message.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success-color);
            color: var(--success-color);
        }

        .status-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--error-color);
            color: var(--error-color);
        }

        .library-section {
            margin-top: 20px;
        }

        .library-section h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .library-section .note {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--primary-color);
        }

        .library-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .library-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 12px;
            background: var(--bg-light);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .library-item:hover {
            border-color: var(--primary-color);
        }

        .library-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .library-item label {
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .library-item input[type="checkbox"]:checked + label {
            color: var(--primary-light);
            font-weight: 500;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 16px;
            }

            .section-header {
                flex-direction: column;
                gap: 14px;
                align-items: stretch;
            }

            .button-group {
                justify-content: center;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }

            textarea {
                min-height: 250px;
            }

            .header-right {
                width: 100%;
            }
        }
    </style>
</head>
<body>

        <header>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">

                    </svg>
                </button>
            </div>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <div class="main-grid">
            <aside class="sidebar" id="sidebar">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>

                </h2>

                <h3>基础测试</h3>
                <ul class="example-list" id="exampleList">
                </ul>

            <main class="workspace">
                <div class="card">
                    <div class="section-header">
                        <h2>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M14.447 3.027a.75.75 0 01.527.92l-4.5 16.5a.75.75 0 01-1.448-.394l4.5-16.5a.75.75 0 01.921-.526zM16.72 6.22a.75.75 0 011.06 0l5.25 5.25a.75.75 0 010 1.06l-5.25 5.25a.75.75 0 11-1.06-1.06L21.44 12l-4.72-4.72a.75.75 0 010-1.06zm-9.44 0a.75.75 0 010 1.06L2.56 12l4.72 4.72a.75.75 0 11-1.06 1.06L.97 12.53a.75.75 0 010-1.06l5.25-5.25a.75.75 0 011.06 0z"/>

println("请从左侧选择一个示例，或直接在此输入代码进行测试。")</textarea>
                </div>

                                    <path d="M20 7h-4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V11c0-1.1-.9-2-2-2z"/>

    <script>
        // 主题系统
        function initTheme() {
            const savedTheme = localStorage.getItem('kotlite-theme');
            
            if (!savedTheme) {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (!prefersDark) {
                    document.body.classList.add('light-mode');
                    document.getElementById('moon-icon').style.display = 'none';
                    document.getElementById('sun-icon').style.display = 'block';
                }
            } else if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('moon-icon').style.display = 'none';
                document.getElementById('sun-icon').style.display = 'block';
            }
            
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                const savedTheme = localStorage.getItem('kotlite-theme');
                if (!savedTheme) {
                    if (e.matches) {
                        document.body.classList.remove('light-mode');
                        document.getElementById('moon-icon').style.display = 'block';
                        document.getElementById('sun-icon').style.display = 'none';
                    } else {
                        document.body.classList.add('light-mode');
                        document.getElementById('moon-icon').style.display = 'none';
                        document.getElementById('sun-icon').style.display = 'block';
                    }
                }
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('kotlite-theme', isLight ? 'light' : 'dark');
            
            const moonIcon = document.getElementById('moon-icon');
            const sunIcon = document.getElementById('sun-icon');
            if (isLight) {
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            } else {
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            }
        }

        initTheme();
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

        // 移动端侧边栏
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        mobileMenuBtn.addEventListener('click', function() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        });

        sidebarOverlay.addEventListener('click', function() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });

        // 显示状态消息
        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + (isError ? 'error' : 'success');
            setTimeout(() => {
                statusEl.className = 'status-message';
            }, 3000);
        }

        // 示例代码
        const examples = [
            { category: '基础测试', name: 'Hello World', id: 'hello', code: 'println("Hello, 世界！")\nprintln("欢迎使用 Kotlite！")' },
            { category: '基础测试', name: '变量和数据类型', id: 'variables', code: '// 变量声明\nval immutable = "我是不可变的"\nvar mutable = "我是可变的"\nmutable = "我改变了！"\n\n// 数据类型\nval intNum: Int = 42\nval longNum: Long = 10000000000L\nval doubleNum: Double = 3.14159\nval booleanVal: Boolean = true\nval charVal: Char = \'A\'\n\nprintln("整数: " + intNum)\nprintln("长整数: " + longNum)\nprintln("浮点数: " + doubleNum)\nprintln("布尔值: " + booleanVal)\nprintln("字符: " + charVal)\nprintln("不可变变量: " + immutable)\nprintln("可变变量: " + mutable)' },

            { category: '基础测试', name: '数学运算', id: 'math', code: '// 基本运算\nval a = 10\nval b = 3\nprintln(a + " + " + b + " = " + (a + b))\nprintln(a + " - " + b + " = " + (a - b))\nprintln(a + " * " + b + " = " + (a * b))\nprintln(a + " / " + b + " = " + (a / b))\nprintln(a + " % " + b + " = " + (a % b))\n\n// 比较运算\nprintln(a + " > " + b + ": " + (a > b))\nprintln(a + " == " + b + ": " + (a == b))' },
            { category: '列表集合', name: 'List 操作', id: 'list', code: '// 创建列表\nval list = listOf("苹果", "香蕉", "橙子")\nprintln("原列表: " + list)\n\n// 访问元素\nprintln("第一个元素: " + list[0])\nprintln("最后一个元素: " + list[list.size - 1])\n\n// 遍历\nprintln("\\n遍历列表:")\nfor (item in list) {\n    println("- " + item)\n}\n\n// 索引遍历\nprintln("\\n索引遍历:")\nfor ((index, item) in list.withIndex()) {\n    println(index + ": " + item)\n}\n\n// 可变列表\nval mutableList = mutableListOf(1, 2, 3)\nprintln("\\n可变列表初始: " + mutableList)\nmutableList.add(4)\nmutableList.add(0, 0)\nprintln("添加后: " + mutableList)\nmutableList.remove(2)\nprintln("删除后: " + mutableList)' },
            { category: '列表集合', name: 'Map 操作', id: 'map', code: '// 创建 Map\nval map = mapOf(\n    "one" to 1,\n    "two" to 2,\n    "three" to 3\n)\nprintln("原Map: " + map)\n\n// 访问值\nprintln("键 \\\"one\\\" 的值: " + map["one"])\nprintln("键 \\\"four\\\" 的值或默认: " + map.getOrDefault("four", 0))\n\n// 遍历\nprintln("\\n遍历 Map:")\nfor ((key, value) in map) {\n    println(key + " -> " + value)\n}\n\n// 可变 Map\nval mutableMap = mutableMapOf<String, Int>()\nmutableMap["a"] = 10\nmutableMap["b"] = 20\nprintln("\\n可变Map: " + mutableMap)\nmutableMap["c"] = 30\nprintln("添加后: " + mutableMap)\nmutableMap.remove("a")\nprintln("删除后: " + mutableMap)' },
            { category: '控制流程', name: '条件语句', id: 'condition', code: 'val score = 85\n\n// if 表达式\nval result = if (score >= 90) {\n    "优秀"\n} else if (score >= 80) {\n    "良好"\n} else if (score >= 60) {\n    "及格"\n} else {\n    "不及格"\n}\nprintln("成绩 " + score + ": " + result)\n\nval grade = \'B\'\nval desc = when (grade) {\n    \'A\' -> "优秀"\n    \'B\' -> "良好"\n    \'C\' -> "合格"\n    else -> "其他"\n}\nprintln("等级 " + grade + ": " + desc)' },
            { category: '控制流程', name: '循环控制', id: 'loop', code: '// for 循环范围\nprintln("1到5:")\nfor (i in 1..5) {\n    print(i + " ")\n}\n\nprintln("\\n\\n5到1:")\nfor (i in 5 downTo 1) {\n    print(i + " ")\n}\n\nprintln("\\n\\n1到10，步长2:")\nfor (i in 1..10 step 2) {\n    print(i + " ")\n}\n\nprintln("\\n\\n直到10:")\nfor (i in 1 until 10) {\n    print(i + " ")\n}\n\n// while 循环\nprintln("\\n\\nwhile 循环:")\nvar n = 1\nwhile (n <= 5) {\n    print((n * n) + " ")\n    n++\n}' },
            { category: '函数', name: '函数定义', id: 'functions', code: '// 简单函数\nfun greet(name: String): String {\n    return "你好, " + name + "！"\n}\nprintln(greet("张三"))\n\n// 单表达式函数\nfun add(a: Int, b: Int): Int = a + b\nprintln("10 + 20 = " + add(10, 20))\n\n// 带默认参数的函数\nfun greetDefault(name: String = "访客"): String {\n    return "欢迎, " + name + "！"\n}\nprintln(greetDefault())\nprintln(greetDefault("李四"))\n\n// 可变参数\nfun sum(vararg numbers: Int): Int {\n    var total = 0\n    for (num in numbers) {\n        total += num\n    }\n    return total\n}\nprintln("求和 1-5: " + sum(1, 2, 3, 4, 5))' },
            { category: '函数', name: 'Lambda 表达式', id: 'lambda', code: '// 简单的 Lambda\nval double = { x: Int -> x * 2 }\nprintln("double(5): " + double(5))\n\n// 结合列表操作\nval numbers = listOf(1, 2, 3, 4, 5)\nprintln("原列表: " + numbers)\n\nval doubled = numbers.map { it * 2 }\nprintln("乘以2: " + doubled)\n\nval evens = numbers.filter { it % 2 == 0 }\nprintln("偶数: " + evens)\n\nval sum = numbers.reduce { acc, num -> acc + num }\nprintln("求和: " + sum)' },
            { category: '实战示例', name: '斐波那契数列', id: 'fibonacci', code: 'fun fibonacci(n: Int) {\n    var a = 0\n    var b = 1\n    \n    for (i in 1..n) {\n        println(a)\n        val next = a + b\n        a = b\n        b = next\n    }\n}\n\nprintln("斐波那契前10项:")\nfibonacci(10)' },
            { category: '实战示例', name: '素数检测', id: 'prime', code: 'fun isPrime(n: Int): Boolean {\n    if (n <= 1) return false\n    if (n <= 3) return true\n    if (n % 2 == 0 || n % 3 == 0) return false\n    \n    var i = 5\n    while (i * i <= n) {\n        if (n % i == 0 || n % (i + 2) == 0) return false\n        i += 6\n    }\n    return true\n}\n\n// 查找 1-50 之间的素数\nprintln("1-50之间的素数:")\nfor (i in 1..50) {\n    if (isPrime(i)) {\n        println(i)\n    }\n}' },
            { category: '实战示例', name: '排序算法', id: 'sort', code: 'fun bubbleSort(arr: MutableList<Int>) {\n    val n = arr.size\n    for (i in 0 until n - 1) {\n        for (j in 0 until n - i - 1) {\n            if (arr[j] > arr[j + 1]) {\n                // 交换\n                val temp = arr[j]\n                arr[j] = arr[j + 1]\n                arr[j + 1] = temp\n            }\n        }\n    }\n}\n\nval arr = mutableListOf(64, 34, 25, 12, 22, 11, 90)\nprintln("排序前: " + arr)\nbubbleSort(arr)\nprintln("排序后: " + arr)' },
            { category: '实战示例', name: '文本频率统计', id: 'wordcount', code: 'fun wordCount(text: String): Map<String, Int> {\n    val words = text.toLowerCase().split(" ", ",", ".", "!", "?")\n        .filter { it.isNotEmpty() }\n    \n    val countMap = mutableMapOf<String, Int>()\n    for (word in words) {\n        countMap[word] = (countMap[word] ?: 0) + 1\n    }\n    \n    return countMap.toSortedMap()\n}\n\nval text = "Kotlin is a great language. Kotlin is fun!"\nval counts = wordCount(text)\nprintln("词频统计:")\nfor ((word, count) in counts) {\n    println("- " + word + ": " + count)\n}' },
            { category: '实战示例', name: '简单计算器', id: 'calculator', code: 'fun calculate(a: Double, b: Double, op: Char): Double {\n    return when (op) {\n        \'+\' -> a + b\n        \'-\' -> a - b\n        \'*\' -> a * b\n        \'/\' -> if (b != 0.0) a / b else Double.NaN\n        \'%\' -> a % b\n        else -> throw IllegalArgumentException("未知操作符: " + op)\n    }\n}\n\nprintln("100 + 50 = " + calculate(100.0, 50.0, \'+\'))\nprintln("100 - 50 = " + calculate(100.0, 50.0, \'-\'))\nprintln("100 * 50 = " + calculate(100.0, 50.0, \'*\'))\nprintln("100 / 50 = " + calculate(100.0, 50.0, \'/\'))\nprintln("100 % 50 = " + calculate(100.0, 50.0, \'%\'))' }
        ];

        // 填充示例列表
        const exampleList = document.getElementById('exampleList');
        let currentActiveExample = null;
        let currentCategory = '';
        
        examples.forEach(example => {
            if (example.category !== currentCategory) {
                const h3 = document.createElement('h3');
                h3.textContent = example.category;
                exampleList.appendChild(h3);
                currentCategory = example.category;
            }
            
            const li = document.createElement('li');
            const btn = document.createElement('button');
            btn.className = 'example-btn';
            btn.textContent = example.name;
            btn.dataset.exampleId = example.id;
            
            btn.addEventListener('click', function() {
                if (currentActiveExample) {
                    currentActiveExample.classList.remove('active');
                }
                btn.classList.add('active');
                currentActiveExample = btn;
                
                document.getElementById('txtCode').value = example.code;
                document.getElementById('txtOutput').value = '';
                showStatus('示例加载成功！');
                
                // 移动端关闭侧边栏
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            });
            
            li.appendChild(btn);
            exampleList.appendChild(li);
        });

        // 按钮事件
        document.getElementById('clearBtn').addEventListener('click', function() {
            document.getElementById('txtCode').value = '';
            showStatus('代码已清空');
        });

        document.getElementById('clearOutputBtn').addEventListener('click', function() {
            document.getElementById('txtOutput').value = '';
            showStatus('输出已清空');
        });

        document.getElementById('copyOutputBtn').addEventListener('click', function() {
            const output = document.getElementById('txtOutput');
            output.select();
            document.execCommand('copy');
            showStatus('输出已复制到剪贴板！');
        });

        document.getElementById('runBtn').addEventListener('click', function() {
            showStatus('正在运行代码...');
        });
    </script>
    <script src="kotlite-demo.js"></script>
</body>
