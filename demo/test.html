<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotlite 测试页面</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent-color: #ec4899;
            --bg-dark: #0f172a;
            --bg-light: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(51, 65, 85, 0.3);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-light), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header-left p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .header-right a {
            color: var(--text-secondary);
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .header-right a:hover {
            color: var(--text-primary);
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .sidebar {
            background: rgba(51, 65, 85, 0.3);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 20px;
            backdrop-filter: blur(10px);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .example-list {
            list-style: none;
        }

        .example-item {
            margin-bottom: 6px;
        }

        .example-btn {
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .example-btn:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .example-btn.active {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
            border-left: 3px solid var(--primary-color);
        }

        .workspace {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: rgba(51, 65, 85, 0.3);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-success:hover {
            background: #0d966a;
            transform: translateY(-2px);
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-primary);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 14px;
            line-height: 1.7;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        #output {
            min-height: 200px;
            background: rgba(26, 26, 46, 0.8);
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
            border: 1px solid transparent;
        }

        .status-message.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success-color);
            color: var(--success-color);
        }

        .status-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--error-color);
            color: var(--error-color);
        }

        .library-section {
            margin-top: 0;
        }

        .library-section h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .library-section .note {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--primary-color);
        }

        .library-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .library-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .library-item:hover {
            border-color: var(--primary-color);
        }

        .library-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .library-item label {
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .library-item input[type="checkbox"]:checked + label {
            color: var(--primary-light);
            font-weight: 500;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 16px;
            }

            .section-header {
                flex-direction: column;
                gap: 14px;
                align-items: stretch;
            }

            .button-group {
                justify-content: center;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>🧪 Kotlite 测试页面</h1>
                <p>一站式测试 Kotlite 所有功能！</p>
            </div>
            <div class="header-right">
                <a href="index.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                    返回主页
                </a>
            </div>
        </header>

        <div class="main-grid">
            <aside class="sidebar">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                    </svg>
                    示例列表
                </h2>
                
                <h3>基础测试</h3>
                <ul class="example-list">
                    <li class="example-item">
                        <button class="example-btn" data-example="hello">1. Hello World</button>
                    </li>
                    <li class="example-item">
                        <button class="example-btn" data-example="variables">2. 变量和数据类型</button>
                    </li>
                    <li class="example-item">
                        <button class="example-btn" data-example="strings">3. 字符串操作</button>
                    </li>
                    <li class="example-item">
                        <button class="example-btn" data-example="math">4. 数学运算</button>
                    </li>
                </ul>

                <h3>列表集合</h3>
                <ul class="example-list">
                    <li class="example-item">
                        <button class="example-btn" data-example="list">5. List 操作</button>
                    </li>
                    <li class="example-item">
                        <button class="example-btn" data-example="map">6. Map 操作</button>
                    </li>
                </ul>

                <h3>控制流程</h3>
                <ul class="example-list">
                    <li class="example-item">
                        <button class="example-btn" data-example="condition">7. 条件语句</button>
                    </li>
                    <li class="example-item">
                        <button class="example-btn" data-example="loop">8. 循环控制</button>
                    </li>
                </ul>

                <h3>函数</h3>
                <ul class="example-list">
                    <li class="example-item">
                        <button class="example-btn" data-example="functions">9. 函数定义</button>
                    </li>
                    <li class="example-item">
                        <button class="example-btn" data-example="lambda">10. Lambda 表达式</button>
                    </li>
                </ul>

                <h3>实战示例</h3>
                <ul class="example-list">
                    <li class="example-item">
                        <button class="example-btn" data-example="fibonacci">11. 斐波那契数列</button>
                    </li>
                    <li class="example-item">
                        <button class="example-btn" data-example="prime">12. 素数检测</button>
                    </li>
                    <li class="example-item">
                        <button class="example-btn" data-example="sort">13. 排序算法</button>
                    </li>
                    <li class="example-item">
                        <button class="example-btn" data-example="wordcount">14. 文本频率统计</button>
                    </li>
                    <li class="example-item">
                        <button class="example-btn" data-example="calculator">15. 简单的计算器</button>
                    </li>
                </ul>
            </aside>

            <main class="workspace">
                <div class="card">
                    <div class="section-header">
                        <h2>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M14.447 3.027a.75.75 0 01.527.92l-4.5 16.5a.75.75 0 01-1.448-.394l4.5-16.5a.75.75 0 01.921-.526zM16.72 6.22a.75.75 0 011.06 0l5.25 5.25a.75.75 0 010 1.06l-5.25 5.25a.75.75 0 11-1.06-1.06L21.44 12l-4.72-4.72a.75.75 0 010-1.06zm-9.44 0a.75.75 0 010 1.06L2.56 12l4.72 4.72a.75.75 0 11-1.06 1.06L.97 12.53a.75.75 0 010-1.06l5.25-5.25a.75.75 0 011.06 0z"/>
                            </svg>
                            代码编辑器
                        </h2>
                        <div class="button-group">
                            <button class="btn btn-secondary" id="clearBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                                </svg>
                                清空
                            </button>
                            <button class="btn btn-primary" id="runBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                                运行代码
                            </button>
                        </div>
                    </div>
                    <div id="statusMessage" class="status-message"></div>
                    <textarea id="codeInput" placeholder="在此输入 Kotlin 代码...">println("欢迎使用 Kotlite 测试页面!")
println("请从左侧选择一个示例，或直接在此输入代码进行测试。")</textarea>
                </div>

                <div class="card">
                    <div class="section-header">
                        <h2>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 4a4 4 0 0 1 4 4v1H6.09C6.57 6.88 8.14 5 12 5v0a5.98 5.98 0 0 1 4.79 2.46l1.42-1.42A8 8 0 0 0 4.06 11H2v2h2.06a8 8 0 0 0 14.15 4.96l-1.42-1.42A6 6 0 0 1 12 19c-3.86 0-5.43-1.88-5.91-4H16v1a4 4 0 0 1-4 4v0a4 4 0 0 1-4-4v0H4v-2h4V8a4 4 0 0 1 4-4v0"/>
                            </svg>
                            输出结果
                        </h2>
                        <div class="button-group">
                            <button class="btn btn-secondary" id="clearOutputBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                                </svg>
                                清空输出
                            </button>
                            <button class="btn btn-success" id="copyOutputBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M16 1H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V3h12v10z"/>
                                    <path d="M20 7h-4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V11c0-1.1-.9-2-2-2z"/>
                                </svg>
                                复制输出
                            </button>
                        </div>
                    </div>
                    <textarea id="output" readonly placeholder="运行结果将显示在这里..."></textarea>
                </div>

                <div class="card library-section">
                    <h3>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
                        </svg>
                        标准库
                    </h3>
                    <p class="note">注意：某些标准库依赖于其他标准库</p>
                    <div class="library-list" id="libraryCheckboxes">
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // 示例代码库
        const examples = {
            hello: `println("Hello, 世界!")
println("欢迎使用 Kotlite!")`,
            
            variables: `// 变量声明
val immutable = "我是不可变的"
var mutable = "我是可变的"
mutable = "我改变了!"

// 数据类型
val intNum: Int = 42
val longNum: Long = 10000000000L
val doubleNum: Double = 3.14159
val booleanVal: Boolean = true
val charVal: Char = 'A'

println("整数: $intNum")
println("长整数: $longNum")
println("浮点数: $doubleNum")
println("布尔值: $booleanVal")
println("字符: $charVal")
println("不可变变量: $immutable")
println("可变变量: $mutable")`,
            
            strings: `val str = "Hello, Kotlin!"

// 基本操作
println("字符串: $str")
println("长度: ${str.length}")
println("大写: ${str.uppercase()}")
println("小写: ${str.lowercase()}")

// 子串
println("子串: ${str.substring(0, 5)}")

// 检查包含
println("包含 'Kotlin': ${str.contains("Kotlin")}")

// 替换
println("替换: ${str.replace("Hello", "Hi")}")

// 去除空格
val strWithSpaces = "   Hello World   "
println("去除空格: '${strWithSpaces.trim()}'")

// 分割和连接
val csv = "apple,banana,orange"
val parts = csv.split(",")
println("分割后: $parts")
println("连接: ${parts.joinToString(" | ")}")`,
            
            math: `// 基本运算
val a = 10
val b = 3
println("$a + $b = ${a + b}")
println("$a - $b = ${a - b}")
println("$a * $b = ${a * b}")
println("$a / $b = ${a / b}")
println("$a % $b = ${a % b}")

// 比较运算
println("$a > $b: ${a > b}")
println("$a == $b: ${a == b}")

// 使用 Math 库
import kotlin.math.*
println("绝对值 -42: ${abs(-42)}")
println("最大 100, 200: ${max(100, 200)}")
println("最小 100, 200: ${min(100, 200)}")
println("平方根 16: ${sqrt(16.0)}")
println("2^8: ${2.0.pow(8.0)}")
println("四舍五入 3.7: ${round(3.7)}")
println("向下取整 3.7: ${floor(3.7)}")
println("向上取整 3.1: ${ceil(3.1)}")`,
            
            list: `// 创建列表
val list = listOf("苹果", "香蕉", "橙子")
println("原列表: $list")

// 访问元素
println("第一个元素: ${list[0]}")
println("最后一个元素: ${list[list.size - 1]}")

// 遍历
println("\\n遍历列表:")
for (item in list) {
    println("- $item")
}

// 索引遍历
println("\\n索引遍历:")
for ((index, item) in list.withIndex()) {
    println("$index: $item")
}

// 可变列表
val mutableList = mutableListOf(1, 2, 3)
println("\\n可变列表初始: $mutableList")
mutableList.add(4)
mutableList.add(0, 0)
println("添加后: $mutableList")
mutableList.remove(2)
println("删除后: $mutableList")

// 列表转换
println("\\n映射: ${mutableList.map { it * 2 }}")
println("过滤: ${mutableList.filter { it % 2 == 0 }}")
println("求和: ${mutableList.sum()}")`,
            
            map: `// 创建 Map
val map = mapOf(
    "one" to 1,
    "two" to 2,
    "three" to 3
)
println("原Map: $map")

// 访问值
println("键 'one' 的值: ${map["one"]}")
println("键 'four' 的值或默认: ${map.getOrDefault("four", 0)}")

// 遍历
println("\\n遍历 Map:")
for ((key, value) in map) {
    println("$key -> $value")
}

// 可变 Map
val mutableMap = mutableMapOf<String, Int>()
mutableMap["a"] = 10
mutableMap["b"] = 20
println("\\n可变Map: $mutableMap")
mutableMap["c"] = 30
println("添加后: $mutableMap")
mutableMap.remove("a")
println("删除后: $mutableMap")`,
            
            condition: `val score = 85

// if 表达式
val result = if (score >= 90) {
    "优秀"
} else if (score >= 80) {
    "良好"
} else if (score >= 60) {
    "及格"
} else {
    "不及格"
}
println("成绩 $score: $result")

// when 表达式
val grade = 'B'
val desc = when (grade) {
    'A' -> "优秀"
    'B' -> "良好"
    'C' -> "合格"
    else -> "其他"
}
println("等级 $grade: $desc")`,
            
            loop: `// for 循环范围
println("1到5:")
for (i in 1..5) {
    print("$i ")
}

println("\\n\\n5到1:")
for (i in 5 downTo 1) {
    print("$i ")
}

println("\\n\\n1到10，步长2:")
for (i in 1..10 step 2) {
    print("$i ")
}

println("\\n\\n直到10:")
for (i in 1 until 10) {
    print("$i ")
}

// while 循环
println("\\n\\nwhile 循环:")
var n = 1
while (n <= 5) {
    print("${n * n} ")
    n++
}`,
            
            functions: `// 简单函数
fun greet(name: String): String {
    return "你好, $name!"
}
println(greet("张三"))

// 单表达式函数
fun add(a: Int, b: Int): Int = a + b
println("10 + 20 = ${add(10, 20)}")

// 带默认参数的函数
fun greetDefault(name: String = "访客"): String {
    return "欢迎, $name!"
}
println(greetDefault())
println(greetDefault("李四"))

// 可变参数
fun sum(vararg numbers: Int): Int {
    var total = 0
    for (num in numbers) {
        total += num
    }
    return total
}

    if (n <= 1) return false
    if (n <= 3) return true
    if (n % 2 == 0 || n % 3 == 0) return false

        if (n % i == 0 || n % (i + 2) == 0) return false
        i += 6
    }

            sort: `fun bubbleSort(arr: MutableList<Int>) {
    val n = arr.size
    for (i in 0 until n - 1) {
        for (j in 0 until n - i - 1) {
            if (arr[j] > arr[j + 1]) {
                // 交换
                val temp = arr[j]
                arr[j] = arr[j + 1]
                arr[j + 1] = temp
            }
        }
    }
}
