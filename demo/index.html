<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotlite 解释器演示</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent-color: #ec4899;
            --bg-dark: #0f172a;
            --bg-light: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        .light-mode {
            --primary-color: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #4338ca;
            --accent-color: #db2777;
            --bg-dark: #f8fafc;
            --bg-light: #e2e8f0;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .header-left h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-light), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header-left p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-right a {
            color: var(--text-secondary);
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .header-right a:hover {
            color: var(--text-primary);
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        #theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            padding: 10px;
            transition: all 0.3s ease;
            color: var(--text-primary);
            display: flex;
            align-items: center;
        }

        #theme-toggle:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .header-right {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* 侧边栏 */
        .sidebar {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 20px;
            backdrop-filter: blur(10px);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .example-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .example-btn {
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .example-btn:hover {
            background: var(--bg-light);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .example-btn.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(236, 72, 153, 0.15));
            color: var(--primary-light);
            border-color: var(--primary-color);
        }

        /* 移动端侧边栏 */
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                overflow-y: auto;
                border-radius: 0;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-menu-btn {
                display: flex;
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 999;
            }

            .sidebar-overlay.show {
                display: block;
            }
        }

        .mobile-menu-btn {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 10px 16px;
            margin-right: 12px;
            transition: all 0.3s ease;
            align-items: center;
        }

        .mobile-menu-btn:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 14px;
            line-height: 1.7;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        #txtOutput {
            min-height: 250px;
        }

        .output-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .library-section {
            margin-top: 0;
        }

        .library-section h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .library-section .note {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--primary-color);
        }

        .library-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .library-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .library-item:hover {
            background: var(--bg-light);
        }

        .library-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .library-item label {
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .library-item input[type="checkbox"]:checked + label {
            color: var(--primary-light);
            font-weight: 500;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
            border: 1px solid transparent;
        }

        .status-message.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success-color);
            color: var(--success-color);
        }

        .status-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--error-color);
            color: var(--error-color);
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 16px;
            }

            .section-header {
                flex-direction: column;
                gap: 14px;
                align-items: stretch;
            }

            .button-group {
                justify-content: center;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }

            textarea {
                min-height: 250px;
            }

            .header-right {
                width: 100%;
            }
        }
    </style>
</head>

    <script>
        // 主题系统
        function initTheme() {
            const savedTheme = localStorage.getItem('kotlite-theme');
            
            if (!savedTheme) {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (!prefersDark) {
                    document.body.classList.add('light-mode');
                    document.getElementById('moon-icon').style.display = 'none';
                    document.getElementById('sun-icon').style.display = 'block';
                }
            } else if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('moon-icon').style.display = 'none';
                document.getElementById('sun-icon').style.display = 'block';
            }
            
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                const savedTheme = localStorage.getItem('kotlite-theme');
                if (!savedTheme) {
                    if (e.matches) {
                        document.body.classList.remove('light-mode');
                        document.getElementById('moon-icon').style.display = 'block';
                        document.getElementById('sun-icon').style.display = 'none';
                    } else {
                        document.body.classList.add('light-mode');
                        document.getElementById('moon-icon').style.display = 'none';
                        document.getElementById('sun-icon').style.display = 'block';
                    }
                }
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('kotlite-theme', isLight ? 'light' : 'dark');
            
            const moonIcon = document.getElementById('moon-icon');
            const sunIcon = document.getElementById('sun-icon');
            if (isLight) {
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            } else {
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            }
        }

        initTheme();
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

        // 移动端侧边栏
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        mobileMenuBtn.addEventListener('click', function() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        });

        sidebarOverlay.addEventListener('click', function() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });

        // 显示状态消息
        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + (isError ? 'error' : 'success');
            setTimeout(() => {
                statusEl.className = 'status-message';
            }, 3000);
        }

        // 示例代码
        const examples = {
            hello: {
                name: 'Hello World',
                code: 'println("Hello, World!")'
            },
            variables: {
                name: '变量和数据类型',
                code: '// 变量声明\nval immutable = "我是不可变的"\nvar mutable = "我是可变的"\nmutable = "我改变了!"\n\n// 数据类型\nval intNum: Int = 42\nval longNum: Long = 10000000000L\nval doubleNum: Double = 3.14159\nval booleanVal: Boolean = true\nval charVal: Char = \'A\'\n\nprintln("整数: " + intNum)\nprintln("长整数: " + longNum)\nprintln("浮点数: " + doubleNum)\nprintln("布尔值: " + booleanVal)\nprintln("字符: " + charVal)\nprintln("不可变变量: " + immutable)\nprintln("可变变量: " + mutable)'
            },
            strings: {
                name: '字符串操作',
                code: 'val str = "Hello, Kotlin!"\n\n// 基本操作\nprintln("字符串: " + str)\nprintln("长度: " + str.length)\n\n// 检查包含\nprintln("包含 \\"Kotlin\\": " + str.contains("Kotlin"))\n\n// 分割\nval parts = str.split(",")\nprintln("分割后: " + parts)'
            },
            list: {
                name: 'List 操作',
                code: '// 创建列表\nval list = listOf("苹果", "香蕉", "橙子")\nprintln("原列表: " + list)\n\n// 访问元素\nprintln("第一个元素: " + list[0])\n\n// 遍历\nprintln("\\n遍历列表:")\nfor (item in list) {\n    println("- " + item)\n}\n\n// 可变列表\nval mutableList = mutableListOf(1, 2, 3)\nprintln("\\n可变列表初始: " + mutableList)\nmutableList.add(4)\nmutableList.add(0, 0)\nprintln("添加后: " + mutableList)'
            },
            condition: {
                name: '条件语句',
                code: 'val score = 85\n\n// if 表达式\nval result = if (score >= 90) {\n    "优秀"\n} else if (score >= 80) {\n    "良好"\n} else if (score >= 60) {\n    "及格"\n} else {\n    "不及格"\n}\nprintln("成绩 " + score + ": " + result)'
            },
            loop: {
                name: '循环控制',
                code: '// for 循环范围\nprintln("1到5:")\nfor (i in 1..5) {\n    println(i)\n}\n\nprintln("\\n直到10:")\nfor (i in 1 until 10) {\n    println(i)\n}'
            },
            functions: {
                name: '函数定义',
                code: '// 简单函数\nfun greet(name: String): String {\n    return "你好, " + name + "!"\n}\nprintln(greet("张三"))\n\n// 单表达式函数\nfun add(a: Int, b: Int): Int = a + b\nprintln("10 + 20 = " + add(10, 20))'
            },
            fibonacci: {
                name: '斐波那契数列',
                code: 'fun fibonacci(n: Int) {\n    var a = 0\n    var b = 1\n    \n    for (i in 1..n) {\n        println(a)\n        val next = a + b\n        a = b\n        b = next\n    }\n}\n\nprintln("斐波那契前10项:")\nfibonacci(10)'
            },
            prime: {
                name: '素数检测',
                code: 'fun isPrime(n: Int): Boolean {\n    if (n <= 1) return false\n    if (n <= 3) return true\n    if (n % 2 == 0 || n % 3 == 0) return false\n    \n    var i = 5\n    while (i * i <= n) {\n        if (n % i == 0 || n % (i + 2) == 0) return false\n        i += 6\n    }\n    return true\n}\n\n// 查找 1-50 之间的素数\nprintln("1-50之间的素数:")\nfor (i in 1..50) {\n    if (isPrime(i)) {\n        println(i)\n    }\n}'
            }
        };

        // 填充示例列表
        const exampleList = document.getElementById('exampleList');
        let currentActiveExample = null;
        Object.keys(examples).forEach(key => {
            const li = document.createElement('li');
            const btn = document.createElement('button');
            btn.className = 'example-btn';
            btn.textContent = examples[key].name;
            btn.dataset.exampleKey = key;
            
            btn.addEventListener('click', function() {
                if (currentActiveExample) {
                    currentActiveExample.classList.remove('active');
                }
                btn.classList.add('active');
                currentActiveExample = btn;
                
                document.getElementById('txtCode').value = examples[key].code;
                document.getElementById('txtOutput').value = '';
                showStatus('示例已加载');
                
                // 移动端关闭侧边栏
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            });
            
            li.appendChild(btn);
            exampleList.appendChild(li);
        });

        // 按钮事件
        document.getElementById('clearBtn').addEventListener('click', function() {
            document.getElementById('txtCode').value = '';
            showStatus('代码已清空');
        });

        document.getElementById('clearOutputBtn').addEventListener('click', function() {
            document.getElementById('txtOutput').value = '';
            showStatus('输出已清空');
        });
    </script>
