<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotlite 测试页面</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent-color: #ec4899;
            --bg-dark: #0f172a;
            --bg-light: #1e293b;
            --bg-card: #334155;
            --bg-input: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        .light-mode {
            --primary-color: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #4338ca;
            --accent-color: #db2777;
            --bg-dark: #f8fafc;
            --bg-light: #e2e8f0;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .header-left-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-light), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .header-left p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-right a {
            color: var(--text-secondary);
            font-size: 24px;
            transition: all 0.3s ease;
            text-decoration: none;
            padding: 10px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .header-right a:hover {
            color: var(--text-primary);
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        #theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            padding: 10px;
            transition: all 0.3s ease;
            color: var(--text-primary);
            display: flex;
            align-items: center;
        }

        #theme-toggle:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 2fr 1fr;
            gap: 20px;
        }

        .sidebar {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 20px;
            backdrop-filter: blur(10px);
            height: fit-content;
            position: sticky;
            top: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 60px);
        }

        .mobile-menu-btn {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 10px 16px;
            transition: all 0.3s ease;
            align-items: center;
        }

        .mobile-menu-btn:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .sidebar-overlay.show {
            display: block;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                overflow-y: auto;
                border-radius: 0;
                max-height: 100vh;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-menu-btn {
                display: flex;
            }
        }

        .sidebar h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .example-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .example-btn {
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .example-btn:hover {
            background: var(--bg-light);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .example-btn.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(236, 72, 153, 0.15));
            color: var(--primary-light);
            border-color: var(--primary-color);
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .code-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .section-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        textarea {
            width: 100%;
            min-height: 400px;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 14px;
            line-height: 1.7;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        #txtOutput {
            min-height: 200px;
            background: #1a1a2e;
        }

        .light-mode #txtOutput {
            background: #f1f5f9;
        }

        .output-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .library-section {
            margin-top: 10px;
        }

        .library-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .library-section .note {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--primary-color);
        }

        .library-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .library-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .library-item:hover {
            background: var(--bg-light);
        }

        .library-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .library-item label {
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .library-item input[type="checkbox"]:checked + label {
            color: var(--primary-light);
            font-weight: 500;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 16px;
            }

            .section-header {
                flex-direction: column;
                gap: 14px;
                align-items: stretch;
            }

            .button-group {
                justify-content: center;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }

            textarea {
                min-height: 300px;
            }

            .header-right {
                width: 100%;
                justify-content: center;
            }
        }

        .status-message {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .status-message.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success-color);
            color: var(--success-color);
        }

        .status-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error-color);
            color: var(--error-color);
        }
    </style>
</head>

        </header>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <div class="main-grid">
            <aside class="sidebar" id="sidebar">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>

    <script>
        // 主题系统
        function initTheme() {
            const savedTheme = localStorage.getItem('kotlite-theme');
            
            if (!savedTheme) {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (!prefersDark) {
                    document.body.classList.add('light-mode');
                    document.getElementById('moon-icon').style.display = 'none';
                    document.getElementById('sun-icon').style.display = 'block';
                }
            } else if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('moon-icon').style.display = 'none';
                document.getElementById('sun-icon').style.display = 'block';
            }
            
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                const savedTheme = localStorage.getItem('kotlite-theme');
                if (!savedTheme) {
                    if (e.matches) {
                        document.body.classList.remove('light-mode');
                        document.getElementById('moon-icon').style.display = 'block';
                        document.getElementById('sun-icon').style.display = 'none';
                    } else {
                        document.body.classList.add('light-mode');
                        document.getElementById('moon-icon').style.display = 'none';
                        document.getElementById('sun-icon').style.display = 'block';
                    }
                }
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('kotlite-theme', isLight ? 'light' : 'dark');
            
            const moonIcon = document.getElementById('moon-icon');
            const sunIcon = document.getElementById('sun-icon');
            if (isLight) {
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            } else {
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            }
        }

        initTheme();
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

        // 移动端侧边栏
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        mobileMenuBtn.addEventListener('click', function() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        });

        sidebarOverlay.addEventListener('click', function() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });

        // 示例代码 - 合并了演示和测试页面的所有示例
        const examples = [
            { category: '基础测试', name: 'Hello World', id: 'hello', code: 'println("Hello, World!")' },
            { category: '基础测试', name: '变量和数据类型', id: 'variables', code: '// 变量声明\nval immutable = "我是不可变的"\nvar mutable = "我是可变的"\nmutable = "我改变了!"\n\n// 数据类型\nval intNum: Int = 42\nval longNum: Long = 10000000000L\nval doubleNum: Double = 3.14159\nval booleanVal: Boolean = true\nval charVal: Char = \'A\'\n\nprintln("整数: " + intNum)\nprintln("长整数: " + longNum)\nprintln("浮点数: " + doubleNum)\nprintln("布尔值: " + booleanVal)\nprintln("字符: " + charVal)\nprintln("不可变变量: " + immutable)\nprintln("可变变量: " + mutable)' },

            { category: '实战示例', name: '素数检测', id: 'prime', code: 'fun isPrime(n: Int): Boolean {\n    if (n <= 1) return false\n    if (n <= 3) return true\n    if (n % 2 == 0 || n % 3 == 0) return false\n    \n    var i = 5\n    while (i * i <= n) {\n        if (n % i == 0 || n % (i + 2) == 0) return false\n        i += 6\n    }\n    return true\n}\n\n// 查找 1-50 之间的素数\nprintln("1-50之间的素数:")\nfor (i in 1..50) {\n    if (isPrime(i)) {\n        println(i)\n    }\n}' },
            { category: '实战示例', name: '数组排序', id: 'sort', code: '// 简单的数组排序演示\nfun main() {\n    // 直接展示手动排序过程\n    val arr = arrayOf(64, 34, 25, 12, 22, 11, 90)\n    println("原始数组: ")\n    for (num in arr) {\n        print(num)\n        print(" ")\n    }\n    println()\n\n    // 简单的冒泡排序\n    val n = arr.size\n    for (i in 0 until n - 1) {\n        for (j in 0 until n - i - 1) {\n            if (arr[j] > arr[j + 1]) {\n                // 交换\n                val temp = arr[j]\n                arr[j] = arr[j + 1]\n                arr[j + 1] = temp\n            }\n        }\n    }\n\n    println("排序后: ")\n    for (num in arr) {\n        print(num)\n        print(" ")\n    }\n    println()\n}\n\nmain()' },

        ];

        // 填充示例列表 - 侧边栏
        const exampleList = document.getElementById('exampleList');
        let currentActiveExample = null;
        let currentCategory = '';
        
        examples.forEach(example => {
            if (example.category !== currentCategory) {
                const h3 = document.createElement('h3');
                h3.textContent = example.category;
                exampleList.appendChild(h3);
                currentCategory = example.category;
            }
            
            const li = document.createElement('li');
            const btn = document.createElement('button');
            btn.className = 'example-btn';
            btn.textContent = example.name;
            btn.dataset.exampleId = example.id;
            
            btn.addEventListener('click', function() {
                if (currentActiveExample) {
                    currentActiveExample.classList.remove('active');
                }
                btn.classList.add('active');
                currentActiveExample = btn;
                
                document.getElementById('txtCode').value = example.code;
                document.getElementById('txtOutput').value = '';
                
                // 移动端关闭侧边栏
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            });
            
            li.appendChild(btn);
            exampleList.appendChild(li);
        });

        // 按钮事件
        document.getElementById('clearBtn').addEventListener('click', function() {
            document.getElementById('txtCode').value = '';
        });

        document.getElementById('clearOutputBtn').addEventListener('click', function() {
            document.getElementById('txtOutput').value = '';
        });

        document.getElementById('copyOutputBtn').addEventListener('click', function() {
            const output = document.getElementById('txtOutput');
            output.select();
            document.execCommand('copy');
        });

        // 显示状态消息
        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + (isError ? 'error' : 'success');
            setTimeout(() => {
                statusEl.className = 'status-message';
            }, 3000);
        }
    </script>
